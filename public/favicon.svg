<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fondo: squircle verde bosque, como el resto de tus íconos de app -->
  <rect width="512" height="512" rx="110" fill="#3E4F37"/>

  <!-- Resplandor cálido general detrás del arco -->
  <circle cx="256" cy="260" r="150" fill="#D9B25E" opacity="0.12"/>

  <!-- Marco de la ventana: arco con madera clara -->
  <path
    d="M166 340 L166 220 C166 150, 210 105, 256 105 C302 105, 346 150, 346 220 L346 340 Z"
    fill="none"
    stroke="#E8DAC0"
    stroke-width="18"
  />

  <!-- Cristal interior: degradado bosque a noche, con resplandor dorado abajo -->
  <path
    d="M175 335 L175 222 C175 158, 213 116, 256 116 C299 116, 337 158, 337 222 L337 335 Z"
    fill="url(#windowGlow)"
  />

  <!-- El resplandor dorado "desde adentro de la cafetería" -->
  <ellipse cx="256" cy="300" rx="55" ry="40" fill="#D9B25E" opacity="0.55" filter="url(#softBlur)"/>

  <!-- Alféizar -->
  <rect x="160" y="335" width="192" height="14" rx="4" fill="#5C4530"/>

  <defs>
    <linearGradient id="windowGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8A6A48" stop-opacity="0.5"/>
      <stop offset="55%" stop-color="#556B4C" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#1C2418"/>
    </linearGradient>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>
</svg>